<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Rejoignez notre programme de fidélité</title>

    <!-- Police Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            font-family: "Inter", sans-serif;
        }

        .demo-validation-page {
            min-height: 100vh;
            background: #22c55e;
            color: white;

            display: flex;
            align-items: center;
            justify-content: center;

            text-align: center;

            padding-left: 44px;
            padding-right: 44px;

            box-sizing: border-box;
        }

        .demo-validation-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .demo-icon {
            width: 96px;
            height: 96px;
        }

        .demo-title {
            margin-top: 24px;
            margin-bottom: 0;

            font-size: 18px;
            line-height: 28px;

            font-weight: 500;
        }

        .demo-reward {
            margin-top: 24px;

            font-size: 18px;
            line-height: 28px;

            font-weight: 400;
        }
    </style>
</head>

<body>

    <div class="demo-validation-page">

        <div class="demo-validation-content">

            <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="demo-icon">

                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />

            </svg>

            <p class="demo-title">
                Ce QR code est valide
            </p>

            <div class="demo-reward">
                1 sundae
            </div>

        </div>

    </div>

</body>

</html>
